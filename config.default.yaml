model:
  backend: openrouter
  id: google/gemini-3.1-flash-lite-preview
  api_key: ""          # STRONGLY prefer OPENROUTER_API_KEY env var; avoid committing credentials
  base_url: https://openrouter.ai/api/v1
  max_tokens: 1024
  connect_timeout_seconds: 10.0
  read_timeout_seconds: 120.0
  write_timeout_seconds: 30.0
  pool_timeout_seconds: 10.0
  max_retries: 2
  retry_backoff_seconds: 0.75

analysis:
  default_max_chunk_seconds: 25.0
  default_overlap_seconds: 3.0
  segment_threshold_seconds: 30.0
  target_sample_rate_hz: 16000
  max_parallel_chunks: 2

output:
  default_json: true

logging:
  level: info

# server:
#   permitted_audio_dir: null   # restrict file access to this directory in server mode
#   request_timeout_seconds: 300.0
